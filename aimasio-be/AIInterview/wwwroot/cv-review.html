<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CV Review - FPT Software VN</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); color: #eee; min-height: 100vh; padding: 1rem; }
    .wrap { max-width: 760px; margin: 0 auto; }
    h1 { margin: 0 0 0.4rem 0; font-size: 1.5rem; }
    .sub { margin: 0 0 1rem 0; color: #b4b4c8; font-size: 0.92rem; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; margin-bottom: 0.9rem; }
    label { display: block; margin-bottom: 0.3rem; color: #d6d6ea; font-size: 0.9rem; }
    input, button { width: 100%; padding: 0.62rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.22); background: rgba(0,0,0,0.28); color: #fff; margin-bottom: 0.6rem; }
    button { border: none; background: linear-gradient(90deg, #e94560, #c1121f); font-weight: 700; cursor: pointer; }
    .muted { color: #a8a8bc; font-size: 0.85rem; }
    .score { font-size: 2.5rem; font-weight: 800; color: #7dffaf; margin: 0.3rem 0 0.7rem 0; }
    ul { margin: 0.45rem 0 0 1.1rem; padding: 0; }
    li { margin-bottom: 0.35rem; }
    .section-title { margin-top: 0.85rem; font-weight: 700; color: #fff; }
    .error { color: #ff8f8f; }
    .ok { color: #7dffaf; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📄 CV Review - FPT Software Việt Nam</h1>
    <p class="sub">Upload CV (PDF/TXT) để chấm điểm và nhận góp ý theo bối cảnh FPT Software Việt Nam.</p>

    <div class="card">
      <label>API Base URL</label>
      <input id="baseUrl" type="text" value="https://localhost:7196" />

      <label>JWT Token</label>
      <input id="token" type="password" placeholder="eyJ..." />

      <label>Vị trí mục tiêu</label>
      <input id="targetRole" type="text" value="Lập trình viên Backend" />

      <label>Bối cảnh công ty</label>
      <input id="companyContext" type="text" value="FPT Software Việt Nam | Outsourcing enterprise | Agile/Scrum | Ưu tiên chất lượng delivery và giao tiếp chuyên nghiệp" />

      <label>File CV (.pdf/.txt/.md)</label>
      <input id="cvFile" type="file" accept=".pdf,.txt,.md" />

      <button id="btnReview" type="button">🚀 Chấm điểm CV</button>
      <p id="status" class="muted">Sẵn sàng.</p>
    </div>

    <div id="result" class="card" style="display:none;">
      <div class="section-title">Điểm tổng quan</div>
      <div class="score" id="score">--</div>
      <div class="section-title">Nhận xét</div>
      <p id="summary"></p>
      <div class="section-title">Điểm mạnh</div>
      <ul id="strengths"></ul>
      <div class="section-title">Điểm còn thiếu</div>
      <ul id="gaps"></ul>
      <div class="section-title">Gợi ý cải thiện</div>
      <ul id="recommendations"></ul>
    </div>
  </div>

  <script>
    (function(){
      function token(){ return (document.getElementById('token').value || '').trim().replace(/^Bearer\s+/i, ''); }
      function baseUrl(){ return (document.getElementById('baseUrl').value || '').trim().replace(/\/$/, ''); }
      function setStatus(msg, ok){
        var s = document.getElementById('status');
        s.textContent = msg;
        s.className = ok === false ? 'error' : (ok === true ? 'ok' : 'muted');
      }
      function renderList(id, arr){
        var ul = document.getElementById(id);
        ul.innerHTML = '';
        (arr || []).forEach(function(x){
          var li = document.createElement('li');
          li.textContent = x;
          ul.appendChild(li);
        });
      }

      document.getElementById('btnReview').onclick = function(){
        var t = token();
        if(!t){ setStatus('Thiếu JWT token.', false); return; }

        var fileInput = document.getElementById('cvFile');
        var file = fileInput.files && fileInput.files[0];
        if(!file){ setStatus('Chưa chọn file CV.', false); return; }

        var form = new FormData();
        form.append('cvFile', file);
        form.append('targetRole', document.getElementById('targetRole').value || '');
        form.append('companyContext', document.getElementById('companyContext').value || '');

        setStatus('Đang phân tích CV...');
        fetch(baseUrl() + '/api/interview/cv-review', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + t },
          body: form
        }).then(function(r){
          if(!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        }).then(function(d){
          document.getElementById('result').style.display = 'block';
          document.getElementById('score').textContent = (d.overallScore || 0) + '/100';
          document.getElementById('summary').textContent = d.summary || '';
          renderList('strengths', d.strengths);
          renderList('gaps', d.gaps);
          renderList('recommendations', d.recommendations);
          setStatus('Chấm điểm CV thành công.', true);
        }).catch(function(e){
          setStatus('Lỗi chấm CV: ' + e.message, false);
        });
      };
    })();
  </script>
</body>
</html>
