<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phỏng vấn AI - Video Call</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); color: #eee; min-height: 100vh; padding: 1rem; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem 0; text-align: center; }
    .sub { color:#a8a8b8; text-align:center; margin: 0 0 1rem 0; font-size: 0.92rem; }
    .setup { max-width: 520px; margin: 0 auto 1rem auto; background: rgba(255,255,255,0.05); padding: 1.25rem; border-radius: 12px; }
    .setup input, .setup button { width: 100%; padding: 0.6rem; margin-bottom: 0.5rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: #fff; }
    .setup button { cursor: pointer; font-weight: 600; border: none; }
    .btn-start { background: linear-gradient(90deg, #e94560, #c1121f); }
    .btn-fe { background: #0f3460; }
    .btn-be { background: #0f3460; }
    .btn-fe.active, .btn-be.active { background: #e94560; }

    .call-wrap { max-width: 980px; margin: 0 auto; display: none; }
    .call-wrap.active { display: block; }
    .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
    .panel { position: relative; border-radius: 14px; overflow: hidden; background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.08); min-height: 360px; }
    .panel-header { position: absolute; top: 0.5rem; left: 0.6rem; padding: 0.28rem 0.55rem; background: rgba(0,0,0,0.45); border-radius: 999px; font-size: 0.8rem; z-index: 2; }
    .ai-stage { height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 0.7rem; }
    .avatar-wrap { position: relative; display: inline-block; }
    .avatar-face { width: 140px; height: 140px; border-radius: 50%; background: linear-gradient(145deg, #4a5568, #2d3748); border: 3px solid rgba(233,69,96,0.5); position: relative; overflow: hidden; box-shadow: 0 0 0 4px rgba(233,69,96,0.12); }
    .avatar-face.speaking .mouth-anim { animation: mouthTalk 0.3s ease-in-out infinite alternate; }
    .avatar-face .eyes { display: flex; justify-content: center; gap: 20px; margin-top: 32px; }
    .avatar-face .eye { width: 12px; height: 16px; background: #fff; border-radius: 50%; }
    .avatar-face .mouth-anim { width: 24px; height: 8px; background: #c1121f; border-radius: 0 0 12px 12px; margin: 20px auto 0; transition: transform 0.1s; }
    .ai-status { font-size: 0.95rem; color: #6f6; }
    .user-video { width: 100%; height: 100%; object-fit: cover; background: #111; transform: scaleX(-1); }
    .empty-cam { position: absolute; inset: 0; display:flex; align-items:center; justify-content:center; color:#a8a8b8; font-size:0.9rem; }
    .controls { display:flex; gap:0.6rem; margin-top:0.9rem; }
    .controls button { flex:1; padding:0.65rem; border:none; border-radius:10px; cursor:pointer; font-weight:600; color:#fff; background:#0f3460; }
    .controls .danger { background:#8b1e3f; }
    .controls .active { background:#e94560; }
    .status-line { margin-top: 0.8rem; padding: 0.7rem 0.9rem; border-radius: 10px; background: rgba(0,0,0,0.35); color:#8dffb5; font-size:0.9rem; }
    .feedback-tools { display:flex; gap:0.5rem; margin-top:0.55rem; }
    .feedback-tools button { flex:1; padding:0.52rem; border:none; border-radius:8px; cursor:pointer; color:#fff; background:#1f315a; font-size:0.86rem; }
    .feedback-tools button.good { background:#1f6b45; }
    .feedback-tools button.bad { background:#7c2e3e; }
    .feedback-tools button:disabled { opacity:0.55; cursor:not-allowed; }

    .result-panel { padding: 1.2rem; background: rgba(0,0,0,0.4); border-radius: 12px; margin-top: 0.9rem; text-align: center; display: none; }
    .result-panel.show { display: block; }
    .result-panel .score { font-size: 3rem; font-weight: 800; color: #6f6; }
    .result-panel .feedback { margin-top: 0.75rem; color: #ccc; }
    @keyframes mouthTalk {
      from { transform: scaleY(1); }
      to { transform: scaleY(1.8); }
    }
    @media (max-width: 880px) {
      .video-grid { grid-template-columns: 1fr; }
      .panel { min-height: 280px; }
    }
  </style>
</head>
<body>
  <h1>🎥 Phỏng vấn AI - Video Call</h1>
  <p class="sub">2 người trao đổi bằng giọng nói. Transcript được xử lý nội bộ, không hiển thị lên màn hình.</p>

  <div class="setup" id="setup">
    <input type="text" id="baseUrl" value="https://localhost:7196" placeholder="API Base URL" />
    <input type="password" id="token" placeholder="JWT Token (eyJ...)" />
    <input type="text" id="companyContext" value="FPT Software Việt Nam | Môi trường outsourcing enterprise | Team Agile/Scrum | Ưu tiên delivery ổn định, chất lượng code và giao tiếp chuyên nghiệp" placeholder="Bối cảnh công ty/ngách cần tập trung (ví dụ: FPT Software Việt Nam, banking domain, khách hàng Nhật...)" />
    <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
      <button type="button" id="btnRoleFE" class="btn-fe">📱 Frontend</button>
      <button type="button" id="btnRoleBE" class="btn-be active">⚙️ Backend</button>
    </div>
    <button type="button" id="btnStart" class="btn-start" style="margin-top:0.75rem;">📞 Bắt đầu cuộc gọi phỏng vấn</button>
    <p id="micStatus" style="font-size:0.82rem;margin:0.5rem 0 0;color:#9fe3b1;"></p>
  </div>

  <div class="call-wrap" id="callWrap">
    <div class="video-grid">
      <div class="panel">
        <div class="panel-header">AI Interviewer</div>
        <div class="ai-stage">
          <div class="avatar-wrap">
            <div class="avatar-face" id="avatarFace">
              <div class="eyes"><span class="eye"></span><span class="eye"></span></div>
              <div class="mouth-anim"></div>
            </div>
          </div>
          <div class="ai-status" id="status">AI đang chuẩn bị cuộc gọi...</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">Bạn</div>
        <video id="userVideo" class="user-video" autoplay playsinline muted></video>
        <div class="empty-cam" id="camPlaceholder">Camera đang tắt</div>
      </div>
    </div>

    <div class="controls">
      <button type="button" id="btnToggleMic" class="active">🎤 Mic ON</button>
      <button type="button" id="btnToggleCam" class="active">📷 Cam ON</button>
      <button type="button" id="btnEndCall" class="danger">⛔ Kết thúc</button>
    </div>

    <div class="status-line" id="statusLine">Đang kết nối...</div>
    <div class="feedback-tools">
      <button type="button" id="btnFbGood" class="good" disabled>👍 Follow-up hợp lý</button>
      <button type="button" id="btnFbBad" class="bad" disabled>👎 Follow-up chưa ổn</button>
    </div>
    <div class="result-panel" id="resultPanel">
      <p style="margin:0;">Kết quả phỏng vấn</p>
      <p class="score" id="finalScore">--</p>
      <p class="feedback" id="finalFeedback"></p>
    </div>
  </div>

  <script>
  (function(){
    var baseUrl = function(){ return document.getElementById('baseUrl').value.replace(/\/$/,''); };
    var token = function(){ return (document.getElementById('token').value.trim() || '').replace(/^Bearer\s+/i,''); };
    var sessionId = null, currentQuestion = null, currentTranscript = '', recognition = null;
    var silenceTimeoutId = null, isSubmitting = false, isListening = false, SILENCE_MS = 2500;
    var answerTurns = [];
    var sectionDialogue = [];
    var lastLearningEventId = null;
    var MIN_TURNS_PER_SECTION = 2, MAX_TURNS_PER_SECTION = 5;
    var localStream = null, micEnabled = true, camEnabled = true;

    document.getElementById('btnRoleFE').onclick = function(){ document.getElementById('btnRoleBE').classList.remove('active'); this.classList.add('active'); };
    document.getElementById('btnRoleBE').onclick = function(){ document.getElementById('btnRoleFE').classList.remove('active'); this.classList.add('active'); };

    function setStatus(msg){
      document.getElementById('statusLine').textContent = msg;
    }

    function setFeedbackButtonsEnabled(enabled){
      document.getElementById('btnFbGood').disabled = !enabled;
      document.getElementById('btnFbBad').disabled = !enabled;
    }

    function sendLearningFeedback(rating){
      if(!lastLearningEventId) return;
      fetch(baseUrl() + '/api/interview/learning-feedback', {
        method: 'POST',
        headers: {'Content-Type':'application/json','Authorization':'Bearer ' + token()},
        body: JSON.stringify({
          learningEventId: lastLearningEventId,
          userRating: rating,
          userFeedback: rating >= 4 ? 'Follow-up relevant' : 'Follow-up too generic or off-context'
        })
      }).then(function(r){
        if(!r.ok) throw new Error('Feedback failed: ' + r.status);
        setStatus('Đã lưu feedback. Cảm ơn em.');
        setFeedbackButtonsEnabled(false);
      }).catch(function(e){
        setStatus('Lỗi lưu feedback: ' + e.message);
      });
    }

    function startLocalMedia(){
      if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        return Promise.reject(new Error('Trình duyệt không hỗ trợ camera/micro'));
      }
      return navigator.mediaDevices.getUserMedia({ audio: true, video: true }).then(function(stream){
        localStream = stream;
        document.getElementById('userVideo').srcObject = stream;
        document.getElementById('camPlaceholder').style.display = 'none';
        micEnabled = true;
        camEnabled = true;
        updateControlButtons();
      });
    }

    function stopLocalMedia(){
      if(!localStream) return;
      localStream.getTracks().forEach(function(t){ t.stop(); });
      localStream = null;
      document.getElementById('userVideo').srcObject = null;
      document.getElementById('camPlaceholder').style.display = 'flex';
    }

    function setSpeaking(on){
      var a = document.getElementById('avatarFace');
      if(on) a.classList.add('speaking'); else a.classList.remove('speaking');
    }

    // Chọn giọng ưu tiên: tiếng Việt, rồi giọng "natural"/premium để bớt robot
    var preferredVoice = null;
    function initVoices(){
      var voices = window.speechSynthesis.getVoices();
      if(!voices.length) return;
      var vi = voices.filter(function(v){ return v.lang === 'vi-VN' || v.lang.startsWith('vi'); });
      var natural = voices.filter(function(v){ return /natural|premium|online|female|male/i.test(v.name) && (v.lang.startsWith('vi') || v.lang.startsWith('en')); });
      preferredVoice = (vi[0] || natural[0] || voices.find(function(v){ return v.lang.startsWith('vi'); }) || voices[0]) || null;
    }
    if(window.speechSynthesis){
      initVoices();
      window.speechSynthesis.onvoiceschanged = initVoices;
    }

    function speak(txt, onEnd){
      if(!txt || !window.speechSynthesis){ if(onEnd) onEnd(); return; }
      window.speechSynthesis.cancel();
      setSpeaking(true);
      var u = new SpeechSynthesisUtterance(txt);
      u.lang = 'vi-VN';
      u.rate = 0.92;
      u.pitch = 1.03;
      if(preferredVoice) u.voice = preferredVoice;
      u.onend = function(){ setSpeaking(false); if(onEnd) onEnd(); };
      window.speechSynthesis.speak(u);
    }

    function startListening(){
      if(!micEnabled) return;
      if(!recognition) {
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SR){ alert('Dùng Chrome để nhận giọng nói.'); return; }
        recognition = new SR();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'vi-VN';
        recognition.onresult = function(e){
          var t = '';
          for(var i=e.resultIndex;i<e.results.length;i++) if(e.results[i].isFinal) t += e.results[i][0].transcript;
          if(t){
            currentTranscript = (currentTranscript||'') + t;
            setStatus('Đang nghe câu trả lời của bạn...');
            scheduleSubmit();
          }
        };
        recognition.onend = function(){ if(isListening && !isSubmitting) setTimeout(function(){ recognition.start(); }, 200); };
      }
      if(isSubmitting) return;
      currentTranscript = '';
      isListening = true;
      setStatus('🎤 Đang nghe... Bạn trả lời tự nhiên như phỏng vấn thật.');
      try { recognition.start(); } catch (e) {}
    }

    function scheduleSubmit(){
      if(silenceTimeoutId) clearTimeout(silenceTimeoutId);
      silenceTimeoutId = setTimeout(function(){
        silenceTimeoutId = null;
        if(isListening && currentTranscript.trim()) stopAndSubmit();
      }, SILENCE_MS);
    }

    function stopAndSubmit(){
      try{ recognition.stop(); }catch(e){}
      isListening = false;
      if(!currentTranscript.trim()){ setStatus('Chưa nghe rõ. Bạn nói lại giúp mình nhé.'); startListening(); return; }
      doSubmitAnswer();
    }

    // Nhận diện nhanh "hỏi ngược" để AI phản hồi linh hoạt thay vì chấm là câu trả lời chính.
    function isCandidateQuestion(text){
      var t = (text || '').trim().toLowerCase();
      if(!t) return false;
      var wordCount = t.split(/\s+/).filter(Boolean).length;
      var hasQuestionMark = t.indexOf('?') >= 0;
      var startsAsking = /^(cho (em|minh|mình|toi|tôi) hoi|anh\/chi cho|anh chi cho|co the cho|có thể cho|ban co the|bạn có thể|cho hoi)/.test(t);
      var hasQuestionIntent = /(ban co|bạn có|co biet|có biết|vi tri|vị trí|yeu cau|yêu cầu|muc luong|mức lương|phuc loi|phúc lợi|cong viec|công việc|du an|dự án|nhu the nao|như thế nào|vi sao|vì sao)/.test(t);
      var endsWithQuestionParticle = /(khong|không|a|ạ|ha|hả)\s*$/.test(t);

      // Câu hỏi ngược thường ngắn, có ý hỏi trực diện và không đi vào mô tả kinh nghiệm dài.
      if(hasQuestionMark || startsAsking) return true;
      if(hasQuestionIntent && (endsWithQuestionParticle || wordCount <= 18)) return true;
      return false;
    }

    function needsSupportResponse(text){
      var t = (text || '').trim().toLowerCase();
      if(!t) return false;
      return /(khong biet|không biết|chua ro|chưa rõ|bi qua|bí quá|khong nho|không nhớ|khong chac|không chắc|goi y|gợi ý|hint|vi du|ví dụ|giup em|giúp em|giup toi|giúp tôi)/.test(t);
    }

    function isStuckResponse(text){
      var t = (text || '').trim().toLowerCase();
      if(!t) return false;
      return /(khong biet|không biết|chua ro|chưa rõ|khong nho|không nhớ|het y|hết ý|bi qua|bí quá|khong tra loi duoc|không trả lời được|em chiu|chịu)/.test(t);
    }

    function shouldMoveToNextQuestion(latestAnswer){
      // Kết thúc section khi đã đủ lượt và ứng viên bị "kẹt", hoặc quá số lượt đào sâu.
      if(answerTurns.length >= MAX_TURNS_PER_SECTION) return true;
      if(answerTurns.length < MIN_TURNS_PER_SECTION) return false;
      return isStuckResponse(latestAnswer);
    }

    function submitCurrentSectionAndNext(transitionVoice){
      function submitNow(){
        setStatus('Đang chốt section và chuyển câu tiếp theo...');
        fetch(baseUrl()+'/api/interview/submit-answer',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+token()},
          body: JSON.stringify({sessionId:sessionId, questionText:currentQuestion.question, transcript:answerTurns.join(' | ')})
        }).then(function(r){
          if(!r.ok) throw new Error('Submit failed: ' + r.status);
          return r.text();
        }).then(function(t){
          var d = t ? (function(){ try{ return JSON.parse(t); }catch(e){ return null; } })() : null;
          isSubmitting = false;
          answerTurns = [];
          sectionDialogue = [];
          if(!d && t && t.length) return;
          fetchNextQuestion();
        }).catch(function(e){
          setStatus('Lỗi gửi câu trả lời: ' + e.message);
          isSubmitting = false;
          startListening();
        });
      }

      if(transitionVoice){
        speak(transitionVoice, submitNow);
      } else {
        submitNow();
      }
    }

    function requestFollowUp(candidateText, mode){
      document.getElementById('status').textContent = 'AI đang phản hồi...';
      setStatus(mode === 'deepen_answer' ? 'AI đang phản hồi theo câu trả lời của bạn...' : 'Đang xử lý câu hỏi/gợi ý của bạn...');
      var sectionTranscript = sectionDialogue.map(function(turn){
        return (turn.role === 'ai' ? 'HR: ' : 'Ung vien: ') + turn.text;
      }).join('\n');
      return fetch(baseUrl() + '/api/interview/follow-up', {
        method: 'POST',
        headers: {'Content-Type':'application/json','Authorization':'Bearer ' + token()},
        body: JSON.stringify({
          sessionId: sessionId,
          currentQuestion: currentQuestion ? currentQuestion.question : '',
          currentQuestionDescription: currentQuestion ? (currentQuestion.description || '') : '',
          candidateText: candidateText,
          sectionTranscript: sectionTranscript,
          turnIndex: answerTurns.length + 1,
          mode: mode || 'support'
        })
      }).then(function(r){
        if(!r.ok) throw new Error('Follow-up failed: ' + r.status);
        return r.json();
      }).then(function(d){
        var aiReply = (d && d.reply) ? d.reply : 'Không sao, em thử trả lời lại câu hỏi này theo một ví dụ cụ thể nhé.';
        lastLearningEventId = d && d.learningEventId ? d.learningEventId : null;
        setFeedbackButtonsEnabled(!!lastLearningEventId);
        sectionDialogue.push({ role: 'ai', text: aiReply });
        setStatus(mode === 'deepen_answer' ? 'AI đang đào sâu câu trả lời của bạn...' : 'AI đang hỗ trợ gợi ý...');
        // Không ghép thêm câu mặc định để tránh lặp ý và giữ ngữ điệu tự nhiên.
        speak(aiReply, function(){ startListening(); });
      }).catch(function(e){
        setStatus('Lỗi phản hồi: ' + e.message);
        startListening();
      });
    }

    function doSubmitAnswer(){
      if(!sessionId || !currentQuestion || !currentTranscript.trim() || isSubmitting) return;
      isSubmitting = true;
      if(silenceTimeoutId){ clearTimeout(silenceTimeoutId); silenceTimeoutId = null; }
      setStatus('Đang gửi câu trả lời...');

      if(isCandidateQuestion(currentTranscript) || needsSupportResponse(currentTranscript)){
        sectionDialogue.push({ role: 'candidate', text: (currentTranscript || '').trim() });
        isSubmitting = false;
        requestFollowUp(currentTranscript, 'support');
        return;
      }

      answerTurns.push((currentTranscript || '').trim());
      sectionDialogue.push({ role: 'candidate', text: (currentTranscript || '').trim() });

      if(shouldMoveToNextQuestion(currentTranscript)){
        submitCurrentSectionAndNext(
          isStuckResponse(currentTranscript)
            ? 'Cảm ơn em. Mình chuyển sang phần tiếp theo nhé.'
            : ''
        );
        return;
      }

      // Tiếp tục đào sâu theo câu trả lời hiện tại, chưa chuyển câu mới.
      if(answerTurns.length < MAX_TURNS_PER_SECTION){
        isSubmitting = false;
        requestFollowUp(answerTurns.join('\n'), 'deepen_answer');
        return;
      }

      submitCurrentSectionAndNext('');
    }

    function fetchNextQuestion(){
      fetch(baseUrl()+'/api/interview/next-question/'+sessionId, { headers: {'Authorization':'Bearer '+token()} })
        .then(function(r){
          if(!r.ok) throw new Error('Next-question failed: ' + r.status);
          return r.json();
        })
        .then(function(q){
          if(!q || !q.question){
            endInterview();
            return;
          }
          currentQuestion = q;
          answerTurns = [];
          sectionDialogue = [{ role: 'ai', text: q.question }];
          lastLearningEventId = null;
          setFeedbackButtonsEnabled(false);
          document.getElementById('status').textContent = 'AI đang hỏi...';
          // Không hiển thị transcript/message trên UI để giữ trải nghiệm gọi video tự nhiên.
          speak(q.question, function(){ startListening(); });
        })
        .catch(function(e){
          document.getElementById('status').textContent = 'Lỗi kết nối';
          setStatus('Không lấy được câu hỏi tiếp theo: ' + e.message);
          setTimeout(function(){ startListening(); }, 400);
        });
    }

    function endInterview(){
      isListening = false;
      try{ recognition && recognition.stop(); }catch(e){}
      if(!sessionId){
        document.getElementById('status').textContent = 'Cuộc gọi đã đóng';
        setStatus('Bạn đã rời cuộc gọi.');
        stopLocalMedia();
        return;
      }
      document.getElementById('status').textContent = 'Đang chấm điểm...';
      setStatus('Đang tổng hợp kết quả...');
      fetch(baseUrl()+'/api/interview/end',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token()},
        body: JSON.stringify({sessionId:sessionId})
      }).then(function(r){ return r.json(); }).then(function(d){
        document.getElementById('resultPanel').classList.add('show');
        document.getElementById('finalScore').textContent = (d.score||0) + '/10';
        document.getElementById('finalFeedback').textContent = d.feedback || '';
        document.getElementById('status').textContent = 'Kết thúc phỏng vấn';
        setStatus('Cuộc gọi đã kết thúc.');
        sessionId = null;
        currentQuestion = null;
        answerTurns = [];
        sectionDialogue = [];
        lastLearningEventId = null;
        setFeedbackButtonsEnabled(false);
        stopLocalMedia();
      });
    }

    function updateControlButtons(){
      var micBtn = document.getElementById('btnToggleMic');
      var camBtn = document.getElementById('btnToggleCam');
      micBtn.textContent = micEnabled ? '🎤 Mic ON' : '🎤 Mic OFF';
      camBtn.textContent = camEnabled ? '📷 Cam ON' : '📷 Cam OFF';
      if(micEnabled) micBtn.classList.add('active'); else micBtn.classList.remove('active');
      if(camEnabled) camBtn.classList.add('active'); else camBtn.classList.remove('active');
      document.getElementById('camPlaceholder').style.display = camEnabled ? 'none' : 'flex';
    }

    document.getElementById('btnToggleMic').onclick = function(){
      if(!localStream) return;
      micEnabled = !micEnabled;
      localStream.getAudioTracks().forEach(function(t){ t.enabled = micEnabled; });
      updateControlButtons();
      if(!micEnabled){
        isListening = false;
        try{ recognition && recognition.stop(); }catch(e){}
        setStatus('Mic đang tắt.');
      } else if(!isSubmitting) {
        startListening();
      }
    };

    document.getElementById('btnToggleCam').onclick = function(){
      if(!localStream) return;
      camEnabled = !camEnabled;
      localStream.getVideoTracks().forEach(function(t){ t.enabled = camEnabled; });
      updateControlButtons();
    };

    document.getElementById('btnEndCall').onclick = function(){
      endInterview();
    };
    document.getElementById('btnFbGood').onclick = function(){ sendLearningFeedback(5); };
    document.getElementById('btnFbBad').onclick = function(){ sendLearningFeedback(2); };

    document.getElementById('btnStart').onclick = function(){
      var t = token();
      if(!t){ alert('Nhập JWT token.'); return; }
      var role = document.getElementById('btnRoleBE').classList.contains('active') ? 'Lập trình viên Backend' : 'Lập trình viên Frontend';
      var companyContext = (document.getElementById('companyContext').value || '').trim();
      if(!companyContext) companyContext = 'FPT Software Việt Nam | Môi trường outsourcing enterprise | Team Agile/Scrum';
      // Gói context công ty/ngách vào jobRole để backend prompt bám đúng phạm vi phỏng vấn.
      var job = role + (companyContext ? (' | Bối cảnh công ty: ' + companyContext) : '');
      setStatus('Đang xin quyền camera/micro...');
      startLocalMedia().then(function(){
        document.getElementById('setup').style.display = 'none';
        document.getElementById('callWrap').classList.add('active');
        document.getElementById('resultPanel').classList.remove('show');
        document.getElementById('micStatus').textContent = '';
        return fetch(baseUrl()+'/api/interview/start',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},
          body: JSON.stringify({jobRole:job})
        });
      }).then(function(r){
        if(!r.ok) throw new Error('Start failed: ' + r.status);
        return r.text();
      }).then(function(text){
        var d = text ? (function(){ try{ return JSON.parse(text); }catch(e){ return null; } })() : null;
        if(!d || !d.sessionId){ throw new Error(text || 'Không tạo được session'); }
        sessionId = d.sessionId;
        setStatus('AI đã vào phòng. Bắt đầu phỏng vấn...');
        speak('Chào bạn! Mình sẽ lần lượt đặt câu hỏi. Bạn trả lời tự nhiên như một buổi phỏng vấn thực tế nhé.', function(){
          fetchNextQuestion();
        });
      }).catch(function(e){
        sessionId = null;
        currentQuestion = null;
        // Trả UI về màn hình setup để user thấy lỗi và nhập lại token/baseUrl.
        document.getElementById('callWrap').classList.remove('active');
        document.getElementById('setup').style.display = 'block';
        document.getElementById('micStatus').textContent = 'Lỗi khởi tạo: ' + e.message;
        document.getElementById('micStatus').style.color = '#f66';
        setStatus('Khởi tạo thất bại. Kiểm tra token, backend và quyền mic/cam.');
        stopLocalMedia();
      });
    };
  })();
  </script>
</body>
</html>
